# Beauty Clinic — nginx on AWS EC2 (document root = backend/public)
server {
    listen 80;
    server_name _;
    root /var/www/beauty-clinic/backend/public;
    index index.html index.php;

    charset utf-8;
    client_max_body_size 25M;

    # Correct MIME types for Vite bundles (fixes application/octet-stream errors)
    types {
        application/javascript js mjs;
        text/css css;
        application/wasm wasm;
        image/svg+xml svg;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /storage/ {
        try_files $uri =404;
    }

    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /docs {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
