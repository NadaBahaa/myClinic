openapi: 3.0.3
info:
  title: Beauty Clinic Management API
  version: 1.0.0
  description: |
    REST API for the Beauty Clinic Management application.

    ## Authentication
    Most endpoints require a **Bearer token** from `POST /auth/login` (Laravel Sanctum).
    Click **Authorize** and enter: `Bearer {your-token}`

    ## Row-level security
    Doctors only see patients, files, sessions, and appointments linked to their own patient files.
    Admins and assistants have broader access; accountants can access financial reports only.

    ## Rate limits
    | Endpoint group | Limit |
    |----------------|-------|
    | Login | 5/min |
    | Patient search (`GET /patients`) | 30/min |
    | Reports | 20/min |
    | File/photo listing | 60/min |
    | General API | 300/min (configurable) |

  contact:
    name: API Support
  license:
    name: Proprietary

servers:
  - url: http://localhost:8000/api/v1
    description: Local (`php artisan serve`)
  - url: http://127.0.0.1:8000/api/v1
    description: Local alternate
  - url: /api/v1
    description: Relative (same host as Swagger UI)

tags:
  - name: Auth
    description: Login, session, password management
  - name: Patients
    description: Patient demographics (row-level access for doctors)
  - name: Patient Files
    description: Per doctor–patient medical file
  - name: Appointments
    description: Scheduling and calendar
  - name: Sessions
    description: Treatment sessions, billing, materials usage
  - name: Doctors
    description: Practitioner profiles
  - name: Services
    description: Treatment catalog
  - name: Materials & Tools
    description: Inventory and consumables
  - name: Coupons
    description: Discount codes
  - name: Prescriptions
    description: Prescriptions within a patient file
  - name: Photos
    description: Before/after clinical photos
  - name: Attachments
    description: File uploads on patient files
  - name: Reports
    description: Financial and session reports (admin/accountant)
  - name: Notifications
    description: SMS/email reminders
  - name: Settings
    description: Clinic settings
  - name: Users
    description: User management (admin)
  - name: System
    description: Super-admin modules, logs, feature flags

paths:
  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Returns a Sanctum bearer token. Rate-limited to 5 attempts/minute.
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Account deactivated
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Revokes the current access token.
      operationId: authLogout
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: Logged out successfully }

  /auth/me:
    get:
      tags: [Auth]
      summary: Current user
      operationId: authMe
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/User'
                  - type: object
                    properties:
                      moduleVisibility:
                        type: object
                        additionalProperties: { type: boolean }

  /auth/password:
    put:
      tags: [Auth]
      summary: Change password
      operationId: authChangePassword
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, password, password_confirmation]
              properties:
                current_password: { type: string }
                password: { type: string, minLength: 8 }
                password_confirmation: { type: string }
      responses:
        '200': { description: Password updated }
        '422': { description: Current password incorrect or validation failed }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      operationId: authForgotPassword
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200': { description: Reset link sent if email exists }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      operationId: authResetPassword
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [token, email, password, password_confirmation]
              properties:
                token: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                password_confirmation: { type: string }
      responses:
        '200': { description: Password reset successful }

  # ── Patients ──────────────────────────────────────────────────────────────
  /patients:
    get:
      tags: [Patients]
      summary: List patients
      description: |
        Doctors see only patients with a shared patient file.
        Rate-limited to 30 requests/minute (anti-scraping).
      operationId: patientsIndex
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/searchQuery'
      responses:
        '200':
          description: Array of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Patient'
    post:
      tags: [Patients]
      summary: Create patient
      operationId: patientsStore
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'

  /patients/{uuid}:
    parameters:
      - $ref: '#/components/parameters/uuidPath'
    get:
      tags: [Patients]
      summary: Get patient
      operationId: patientsShow
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Patients]
      summary: Update patient
      operationId: patientsUpdate
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientInput'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [Patients]
      summary: Delete patient
      description: Admin only.
      operationId: patientsDestroy
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Deleted }
        '403':
          $ref: '#/components/responses/Forbidden'

  /patients/{patientUuid}/files:
    get:
      tags: [Patient Files]
      summary: List patient files for a patient
      description: Doctors see only their own file.
      operationId: patientFilesIndex
      security: [{ bearerAuth: [] }]
      parameters:
        - name: patientUuid
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PatientFile'

  /patients/{patientUuid}/files/{doctorUuid}:
    get:
      tags: [Patient Files]
      summary: Get or create patient file
      description: Returns the file for a patient+doctor pair (creates if missing).
      operationId: patientFilesShow
      security: [{ bearerAuth: [] }]
      parameters:
        - name: patientUuid
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: doctorUuid
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientFile'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── Appointments ──────────────────────────────────────────────────────────
  /appointments:
    get:
      tags: [Appointments]
      summary: List appointments
      description: Doctors see only their own appointments.
      operationId: appointmentsIndex
      security: [{ bearerAuth: [] }]
      parameters:
        - name: date
          in: query
          schema: { type: string, format: date }
        - name: status
          in: query
          schema:
            type: string
            enum: [scheduled, completed, cancelled]
        - name: doctor
          in: query
          description: Filter by doctor UUID
          schema: { type: string, format: uuid }
        - name: patient
          in: query
          description: Filter by patient UUID
          schema: { type: string, format: uuid }
        - name: date_from
          in: query
          schema: { type: string, format: date }
        - name: date_to
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'
    post:
      tags: [Appointments]
      summary: Create appointment
      operationId: appointmentsStore
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentInput'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '403':
          description: Doctor cannot book for another doctor

  /appointments/date/{date}:
    get:
      tags: [Appointments]
      summary: Appointments by date
      operationId: appointmentsByDate
      security: [{ bearerAuth: [] }]
      parameters:
        - name: date
          in: path
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'

  /appointments/doctor/{uuid}:
    get:
      tags: [Appointments]
      summary: Appointments by doctor
      operationId: appointmentsByDoctor
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/uuidPath'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'

  /appointments/{uuid}:
    parameters:
      - $ref: '#/components/parameters/uuidPath'
    get:
      tags: [Appointments]
      summary: Get appointment
      operationId: appointmentsShow
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      tags: [Appointments]
      summary: Update appointment
      operationId: appointmentsUpdate
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentInput'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
    delete:
      tags: [Appointments]
      summary: Cancel appointment
      description: Soft-deletes and sets status to cancelled.
      operationId: appointmentsDestroy
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Appointment cancelled }

  # ── Sessions ──────────────────────────────────────────────────────────────
  /patient-files/{fileUuid}/sessions:
    parameters:
      - $ref: '#/components/parameters/fileUuidPath'
    get:
      tags: [Sessions]
      summary: List sessions
      operationId: sessionsIndex
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionRecord'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Sessions]
      summary: Record treatment session
      description: Creates billing record, applies coupon, decrements material stock.
      operationId: sessionsStore
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionRecordInput'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecord'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Invalid coupon or price mismatch

  /patient-files/{fileUuid}/sessions/{sessionUuid}:
    parameters:
      - $ref: '#/components/parameters/fileUuidPath'
      - name: sessionUuid
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Sessions]
      summary: Get session
      operationId: sessionsShow
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecord'
    put:
      tags: [Sessions]
      summary: Update session
      description: Admin/accountant may correct financial fields.
      operationId: sessionsUpdate
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notes: { type: string }
                performedBy: { type: string }
                date: { type: string, format: date }
                servicePrice: { type: number }
                totalMaterialsCost: { type: number }
                netProfit: { type: number }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecord'
    delete:
      tags: [Sessions]
      summary: Delete session
      operationId: sessionsDestroy
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Session deleted }

  # ── Doctors & Services ────────────────────────────────────────────────────
  /doctors:
    get:
      tags: [Doctors]
      summary: List doctors
      operationId: doctorsIndex
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Doctor'

  /doctors/{uuid}:
    get:
      tags: [Doctors]
      summary: Get doctor
      operationId: doctorsShow
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/uuidPath'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Doctor'

  /services:
    get:
      tags: [Services]
      summary: List services
      operationId: servicesIndex
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Service'
    post:
      tags: [Services]
      summary: Create service
      description: Admin only.
      operationId: servicesStore
      security: [{ bearerAuth: [] }]
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'

  /services/{uuid}:
    get:
      tags: [Services]
      summary: Get service
      operationId: servicesShow
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/uuidPath'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'

  # ── Materials ─────────────────────────────────────────────────────────────
  /materials-tools:
    get:
      tags: [Materials & Tools]
      summary: List materials and tools
      operationId: materialsIndex
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MaterialOrTool'
    post:
      tags: [Materials & Tools]
      summary: Create material or tool
      operationId: materialsStore
      security: [{ bearerAuth: [] }]
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialOrTool'

  /materials-tools/{uuid}:
    parameters:
      - $ref: '#/components/parameters/uuidPath'
    get:
      tags: [Materials & Tools]
      summary: Get material or tool
      operationId: materialsShow
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialOrTool'
    put:
      tags: [Materials & Tools]
      summary: Update material or tool
      operationId: materialsUpdate
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialOrTool'
    delete:
      tags: [Materials & Tools]
      summary: Delete material or tool
      operationId: materialsDestroy
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Deleted }

  # ── Coupons ───────────────────────────────────────────────────────────────
  /coupons/preview:
    post:
      tags: [Coupons]
      summary: Preview coupon discount
      operationId: couponsPreview
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [code, originalPrice]
              properties:
                code: { type: string }
                originalPrice: { type: number }
      responses:
        '200': { description: Discount preview }

  /coupons:
    get:
      tags: [Coupons]
      summary: List coupons
      description: Admin and assistant only.
      operationId: couponsIndex
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Coupon list }
    post:
      tags: [Coupons]
      summary: Create coupon
      operationId: couponsStore
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Created }

  # ── Patient file sub-resources ──────────────────────────────────────────────
  /patient-files/{fileUuid}/photos:
    parameters:
      - $ref: '#/components/parameters/fileUuidPath'
    get:
      tags: [Photos]
      summary: List photos
      description: Rate-limited (60/min).
      operationId: photosIndex
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Photo list }
    post:
      tags: [Photos]
      summary: Upload photo
      operationId: photosStore
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo, type]
              properties:
                photo:
                  type: string
                  format: binary
                type:
                  type: string
                  enum: [before, after, during]
                notes: { type: string }
                session_id:
                  type: string
                  format: uuid
                  description: Optional session UUID
      responses:
        '201': { description: Photo uploaded }

  /patient-files/{fileUuid}/photos/{photoUuid}:
    delete:
      tags: [Photos]
      summary: Delete photo
      operationId: photosDestroy
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/fileUuidPath'
        - name: photoUuid
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Deleted }

  /patient-files/{fileUuid}/attachments:
    parameters:
      - $ref: '#/components/parameters/fileUuidPath'
    get:
      tags: [Attachments]
      summary: List attachments
      operationId: attachmentsIndex
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Attachment list }
    post:
      tags: [Attachments]
      summary: Upload attachment
      operationId: attachmentsStore
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
                name: { type: string }
                session_id: { type: string, format: uuid }
      responses:
        '201': { description: Uploaded }

  /patient-files/{fileUuid}/prescriptions:
    parameters:
      - $ref: '#/components/parameters/fileUuidPath'
    get:
      tags: [Prescriptions]
      summary: List prescriptions
      operationId: prescriptionsIndex
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Prescription list }
    post:
      tags: [Prescriptions]
      summary: Add prescription
      operationId: prescriptionsStore
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrescriptionInput'
      responses:
        '201': { description: Created }

  # ── Reports ───────────────────────────────────────────────────────────────
  /reports/sessions:
    get:
      tags: [Reports]
      summary: Session report
      description: Admin and accountant only. Rate-limited 20/min.
      operationId: reportsSessions
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/dateTo'
        - $ref: '#/components/parameters/searchQuery'
        - name: per_page
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionsReport'

  /reports/sessions/export:
    get:
      tags: [Reports]
      summary: Export sessions CSV
      operationId: reportsSessionsExport
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/dateTo'
      responses:
        '200':
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /reports/financial:
    get:
      tags: [Reports]
      summary: Financial report
      description: Summary, breakdown by doctor/service, monthly trend.
      operationId: reportsFinancial
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/dateTo'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialReport'
        '403':
          $ref: '#/components/responses/Forbidden'

  /reports/financial/export:
    get:
      tags: [Reports]
      summary: Export financial report CSV
      operationId: reportsFinancialExport
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            text/csv:
              schema:
                type: string

  # ── Notifications ─────────────────────────────────────────────────────────
  /notifications:
    get:
      tags: [Notifications]
      summary: List notification records
      operationId: notificationsIndex
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Notification history }
    post:
      tags: [Notifications]
      summary: Send notification
      operationId: notificationsStore
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Sent }

  /notifications/pending:
    get:
      tags: [Notifications]
      summary: Pending reminders
      operationId: notificationsPending
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Pending appointments for reminders }

  /notifications/send-reminders:
    post:
      tags: [Notifications]
      summary: Send appointment reminders (SMS/email)
      operationId: notificationsSendReminders
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Reminders dispatched }

  # ── Settings ──────────────────────────────────────────────────────────────
  /settings:
    get:
      tags: [Settings]
      summary: Get clinic settings
      operationId: settingsIndex
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Settings key-value map }
    put:
      tags: [Settings]
      summary: Update settings
      description: Admin and superadmin only.
      operationId: settingsUpdate
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Updated }

  # ── Users (admin) ─────────────────────────────────────────────────────────
  /users:
    get:
      tags: [Users]
      summary: List users
      description: Admin only.
      operationId: usersIndex
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  # ── System (superadmin) ───────────────────────────────────────────────────
  /system/modules:
    get:
      tags: [System]
      summary: List system modules
      operationId: systemModules
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Module visibility config }

  /system/feature-flags:
    get:
      tags: [System]
      summary: List feature flags
      operationId: systemFeatureFlags
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Feature flags }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
      description: Token from POST /auth/login

  parameters:
    uuidPath:
      name: uuid
      in: path
      required: true
      schema: { type: string, format: uuid }
    fileUuidPath:
      name: fileUuid
      in: path
      required: true
      schema: { type: string, format: uuid }
    searchQuery:
      name: search
      in: query
      schema: { type: string }
    dateFrom:
      name: date_from
      in: query
      schema: { type: string, format: date }
    dateTo:
      name: date_to
      in: query
      schema: { type: string, format: date }

  responses:
    Unauthorized:
      description: Invalid or missing token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    Forbidden:
      description: Insufficient role or row-level access denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string }
              errors:
                type: object
                additionalProperties:
                  type: array
                  items: { type: string }

  schemas:
    MessageResponse:
      type: object
      properties:
        message: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, example: admin@clinic.com }
        password: { type: string, minLength: 6, example: secret123 }

    LoginResponse:
      type: object
      properties:
        token: { type: string, example: 1|abc123... }
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        role:
          type: string
          enum: [superadmin, admin, doctor, assistant, accountant]
        isActive: { type: boolean }
        practitionerTypeId: { type: string, format: uuid, nullable: true }
        doctorId: { type: string, format: uuid, nullable: true }
        permissions:
          type: object
          properties:
            showCalendar: { type: boolean }
            showPatients: { type: boolean }
            showDoctors: { type: boolean }
            showServices: { type: boolean }
            showUsers: { type: boolean }
            showSettings: { type: boolean }
            showReports: { type: boolean }
            showMaterialsTools: { type: boolean }

    Patient:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        dateOfBirth: { type: string, format: date, nullable: true }
        address: { type: string, nullable: true }
        emergencyContact: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        lastVisit: { type: string, format: date, nullable: true }
        totalVisits: { type: integer }

    PatientInput:
      type: object
      required: [name, email, phone]
      properties:
        name: { type: string, maxLength: 150 }
        email: { type: string, format: email }
        phone: { type: string }
        dateOfBirth: { type: string, format: date }
        address: { type: string }
        emergencyContact: { type: string }
        notes: { type: string }

    PatientFile:
      type: object
      properties:
        id: { type: string, format: uuid }
        patientId: { type: string, format: uuid }
        patientName: { type: string }
        doctorId: { type: string, format: uuid }
        doctorName: { type: string }
        createdAt: { type: string, format: date-time }
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionRecord'

    Appointment:
      type: object
      properties:
        id: { type: string, format: uuid }
        patientId: { type: string, format: uuid }
        patientName: { type: string }
        patientEmail: { type: string }
        doctorId: { type: string, format: uuid }
        doctorName: { type: string }
        services:
          type: array
          items: { type: string }
        serviceIds:
          type: array
          items: { type: string, format: uuid }
        date: { type: string, format: date }
        startTime: { type: string, example: '10:00' }
        endTime: { type: string, example: '11:00' }
        duration: { type: integer, description: Minutes }
        status:
          type: string
          enum: [scheduled, completed, cancelled]
        notes: { type: string, nullable: true }

    AppointmentInput:
      type: object
      required: [patientId, doctorId, date, startTime, endTime, duration, services]
      properties:
        patientId: { type: string, format: uuid }
        doctorId: { type: string, format: uuid }
        date: { type: string, format: date }
        startTime: { type: string, pattern: '^([01]\\d|2[0-3]):[0-5]\\d$' }
        endTime: { type: string, pattern: '^([01]\\d|2[0-3]):[0-5]\\d$' }
        duration: { type: integer, minimum: 5, maximum: 480 }
        status:
          type: string
          enum: [scheduled, completed, cancelled]
          default: scheduled
        notes: { type: string }
        services:
          type: array
          minItems: 1
          items: { type: string, format: uuid }

    SessionRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        patientFileId: { type: string, format: uuid }
        patientId: { type: string, format: uuid }
        patientName: { type: string }
        doctorId: { type: string, format: uuid }
        doctorName: { type: string }
        appointmentId: { type: string, format: uuid, nullable: true }
        date: { type: string, format: date }
        serviceId: { type: string, format: uuid, nullable: true }
        serviceName: { type: string }
        servicePrice: { type: number, format: float }
        discountAmount: { type: number, format: float }
        originalServicePrice: { type: number, format: float, nullable: true }
        couponCode: { type: string, nullable: true }
        materialsUsed:
          type: array
          items:
            $ref: '#/components/schemas/MaterialUsage'
        totalMaterialsCost: { type: number, format: float }
        netProfit: { type: number, format: float }
        performedBy: { type: string }
        notes: { type: string, nullable: true }

    SessionRecordInput:
      type: object
      required: [date, serviceName, servicePrice, performedBy]
      properties:
        date: { type: string, format: date }
        serviceId: { type: string, format: uuid }
        serviceName: { type: string }
        servicePrice: { type: number, minimum: 0 }
        performedBy: { type: string }
        notes: { type: string }
        appointmentId: { type: string, format: uuid }
        couponCode: { type: string }
        originalServicePrice: { type: number }
        materialsUsed:
          type: array
          items:
            type: object
            required: [materialId, quantity, unitPrice]
            properties:
              materialId: { type: string, format: uuid }
              quantity: { type: number, minimum: 0.001 }
              unitPrice: { type: number, minimum: 0 }

    MaterialUsage:
      type: object
      properties:
        materialId: { type: string, format: uuid }
        materialName: { type: string }
        quantity: { type: number }
        unitPrice: { type: number }
        totalPrice: { type: number }

    Doctor:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        specialty: { type: string }
        experience: { type: integer }
        qualifications: { type: string }
        licenseNumber: { type: string }
        availability: { type: array, items: { type: object } }
        totalPatients: { type: integer }
        practitionerTypeId: { type: string, format: uuid }
        practitionerTypeName: { type: string }
        services:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              name: { type: string }
              duration: { type: integer }
              price: { type: number }
              category: { type: string }

    Service:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        category: { type: string }
        duration: { type: integer }
        price: { type: number }
        description: { type: string }
        popular: { type: boolean }
        allowedPractitionerTypeIds:
          type: array
          items: { type: string, format: uuid }
        defaultMaterials:
          type: array
          items:
            type: object
            properties:
              materialId: { type: string, format: uuid }
              name: { type: string }
              unitPrice: { type: number }
              unit: { type: string }
              defaultQuantity: { type: number }

    MaterialOrTool:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        type:
          type: string
          enum: [material, tool]
        unitPrice: { type: number }
        unit: { type: string }
        stockQuantity: { type: number, nullable: true }
        supplier: { type: string }
        notes: { type: string }

    PrescriptionInput:
      type: object
      required: [name, dosage, frequency, duration, prescribedBy]
      properties:
        name: { type: string }
        dosage: { type: string }
        frequency: { type: string }
        duration: { type: string }
        prescribedBy: { type: string }
        notes: { type: string }

    SessionsReport:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SessionRecord'
        meta:
          type: object
          properties:
            current_page: { type: integer }
            last_page: { type: integer }
            per_page: { type: integer }
            total: { type: integer }
        totals:
          type: object
          properties:
            total_sales: { type: number }
            total_discounts: { type: number }
            total_materials_cost: { type: number }
            net_profit: { type: number }
            session_count: { type: integer }

    FinancialReport:
      type: object
      properties:
        summary:
          type: object
          properties:
            total_revenue: { type: number }
            total_discounts: { type: number }
            net_revenue: { type: number }
            total_materials_cost: { type: number }
            net_profit: { type: number }
            session_count: { type: integer }
            avg_session_value: { type: number }
        by_doctor:
          type: array
          items:
            type: object
            properties:
              doctor: { type: string }
              sessions: { type: integer }
              revenue: { type: number }
              discounts: { type: number }
              materials: { type: number }
              net_profit: { type: number }
        by_service:
          type: array
          items:
            type: object
            properties:
              service: { type: string }
              sessions: { type: integer }
              revenue: { type: number }
        monthly_trend:
          type: array
          items:
            type: object
            properties:
              month: { type: string, example: '2026-06' }
              sessions: { type: integer }
              revenue: { type: number }
              net_profit: { type: number }
